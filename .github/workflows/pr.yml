name: PR - Lint and build

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Lint and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Yarn install
        uses: borales/actions-yarn@v5
        with:
          cmd: install

      - name: Lint
        uses: borales/actions-yarn@v5
        with:
          cmd: lint

      - name: Export environment variables
        run: echo "${{ secrets.ENV }}" > .env.local

      - name: Build web
        uses: borales/actions-yarn@v5
        with:
          cmd: build:web

      - name: Test
        uses: borales/actions-yarn@v5
        with:
          cmd: test --watchAll=false

